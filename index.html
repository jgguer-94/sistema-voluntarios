    <style>

        /* Badge */
        .badge {

        .ranking-card {

<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // ==========================================
        // FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyA0G5kwGs3NrFgphFysa-rR1tsSBvmpQqkc",
            authDomain: "cruz-roja-voluntarios.firebaseapp.com",
            databaseURL: "https://cruz-roja-voluntarios-default-rtdb.firebaseio.com",
            projectId: "cruz-roja-voluntarios",
            storageBucket: "cruz-roja-voluntarios.firebasestorage.app",
            messagingSenderId: "950792439139",
            appId: "1:950792439139:web:987f2c073d99f2b6693f56"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const auth = firebase.auth();
        const database = firebase.database();

        // ==========================================
        // UTILITY FUNCTIONS
        // ==========================================
        const generateUsername = (nombreCompleto) => {
            const parts = nombreCompleto.trim().split(' ');
            if (parts.length < 2) return nombreCompleto.toLowerCase();
            
            const nombre = parts[0];
            const apellido1 = parts[1];
            const apellido2 = parts[2] || '';
            
            return (nombre[0] + apellido1 + (apellido2 ? apellido2[0] : '')).toLowerCase();
        };

        const getBadge = (horas) => {
            if (horas >= 201) return { name: '💠 Diamante', class: 'badge-diamante' };
            if (horas >= 101) return { name: '💎 Platino', class: 'badge-platino' };
            if (horas >= 51) return { name: '🥇 Oro', class: 'badge-oro' };
            if (horas >= 21) return { name: '🥈 Plata', class: 'badge-plata' };
            return { name: '🥉 Bronce', class: 'badge-bronce' };
        };

        const calculateHoras = (asistencias) => {
            return Object.values(asistencias || {}).reduce((sum, att) => {
                return sum + (att.horasAprobadas || 0);
            }, 0);
        };

        // ==========================================
        // LOGIN COMPONENT
        // ==========================================
        function Login({ onLogin }) {
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);

                try {
                    const userCredential = await auth.signInWithEmailAndPassword(email, password);
                    const uid = userCredential.user.uid;
                    
                    const snapshot = await database.ref(`usuarios/${uid}`).once('value');
                    const userData = snapshot.val();
                    
                    if (userData) {
                        onLogin({ uid, ...userData });
                    } else {
                        setError('Usuario no encontrado en la base de datos');
                        await auth.signOut();
                    }
                } catch (err) {
                    console.error('Login error:', err);
                    setError('Email o contraseña incorrectos');
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="login-container">
                    <div className="login-box">
                        <div className="logo-section">
                            <h1>🏥 Cruz Roja Peruana</h1>
                            <p>Sistema de Gestión de Voluntarios v2.0</p>
                        </div>
                        
                        {error && <div className="error-message">{error}</div>}
                        
                        <form onSubmit={handleSubmit}>
                            <div className="form-group">
                                <label>Correo Electrónico</label>
                                <input 
                                    type="email" 
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    placeholder="tu@email.com"
                                    required
                                    disabled={loading}
                                />
                            </div>
                            
                            <div className="form-group">
                                <label>Contraseña</label>
                                <input 
                                    type="password" 
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    placeholder="••••••••"
                                    required
                                    disabled={loading}
                                />
                            </div>
                            
                            <button type="submit" className="btn-primary" disabled={loading}>
                                {loading ? 'Iniciando sesión...' : 'Iniciar Sesión'}
                            </button>
                        </form>
                    </div>
                </div>
            );
        }

        // ==========================================
        // COORDINADOR DASHBOARD
        // ==========================================
        function CoordinadorDashboard({ user, onLogout }) {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [volunteers, setVolunteers] = useState([]);
            const [activities, setActivities] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const [modalType, setModalType] = useState('');
            const [formData, setFormData] = useState({});
            const [loading, setLoading] = useState(true);
            const [searchTerm, setSearchTerm] = useState('');
            const [filterStatus, setFilterStatus] = useState('all');
            const [selectedActivity, setSelectedActivity] = useState(null);

            useEffect(() => {
                loadData();
            }, []);

            const loadData = () => {
                database.ref('usuarios').on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const volList = Object.keys(data)
                            .filter(uid => data[uid].rol === 'voluntario')
                            .map(uid => ({ uid, ...data[uid] }));
                        setVolunteers(volList);
                    }
                    setLoading(false);
                });

                database.ref('actividades').on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const actList = Object.keys(data).map(id => ({ id, ...data[id] }));
                        setActivities(actList);
                    } else {
                        setActivities([]);
                    }
                });
            };

            const handleAddVolunteer = async () => {
                if (!formData.nombreCompleto || !formData.correo || !formData.anoIngreso) {
                    alert('Por favor complete todos los campos');
                    return;
                }

                try {
                    const password = 'temporal123';
                    const username = generateUsername(formData.nombreCompleto);
                    
                    const userCredential = await auth.createUserWithEmailAndPassword(formData.correo, password);
                    const uid = userCredential.user.uid;

                    await database.ref(`usuarios/${uid}`).set({
                        nombreCompleto: formData.nombreCompleto,
                        correo: formData.correo,
                        anoIngreso: parseInt(formData.anoIngreso),
                        usuario: username,
                        rol: 'voluntario',
                        primerIngreso: true,
                        horasAcumuladas: 0,
                        estado: 'activo'
                    });

                    setShowModal(false);
                    setFormData({});
                    alert(`Voluntario agregado.\nEmail: ${formData.correo}\nContraseña temporal: temporal123`);
                } catch (error) {
                    console.error('Error:', error);
                    alert('Error al agregar voluntario: ' + error.message);
                }
            };

            const handleToggleStatus = async (uid, currentStatus) => {
                const newStatus = currentStatus === 'activo' ? 'inactivo' : 'activo';
                const action = newStatus === 'activo' ? 'activar' : 'desactivar';
                
                if (confirm(`¿Está seguro de ${action} este voluntario?`)) {
                    try {
                        await database.ref(`usuarios/${uid}`).update({ estado: newStatus });
                    } catch (error) {
                        alert('Error al cambiar estado');
                    }
                }
            };

            const handleDeleteVolunteer = async (uid) => {
                const volunteer = volunteers.find(v => v.uid === uid);
                const hasActivities = activities.some(act => 
                    (act.inscritos && act.inscritos[uid]) || (act.asistencias && act.asistencias[uid])
                );

                if (hasActivities) {
                    alert('No se puede eliminar. Este voluntario tiene actividades registradas. Desactívelo en su lugar.');
                    return;
                }

                if (confirm(`¿Está seguro de ELIMINAR PERMANENTEMENTE a ${volunteer.nombreCompleto}?\n\nEsto no se puede deshacer.`)) {
                    try {
                        const user = firebase.auth().currentUser;
                        await database.ref(`usuarios/${uid}`).remove();
                        // Note: También deberías eliminar el usuario de Firebase Auth, pero requiere re-autenticación
                        alert('Voluntario eliminado');
                    } catch (error) {
                        alert('Error al eliminar: ' + error.message);
                    }
                }
            };

            const handleAddActivity = async () => {
                if (!formData.nombre || !formData.descripcion || !formData.lugar || !formData.fecha) {
                    alert('Por favor complete todos los campos obligatorios');
                    return;
                }

                try {
                    // Comparar solo fechas sin hora
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    const activityDate = new Date(formData.fecha);
                    activityDate.setHours(0, 0, 0, 0);
                    const estadoActividad = activityDate >= today ? 'activa' : 'inactiva';

                    const newActivityRef = database.ref('actividades').push();
                    await newActivityRef.set({
                        nombre: formData.nombre,
                        descripcion: formData.descripcion,
                        lugar: formData.lugar,
                        fecha: formData.fecha,
                        horaInicio: formData.horaInicio || '',
                        horaFin: formData.horaFin || '',
                        estado: estadoActividad,
                        inscritos: {},
                        asistencias: {}
                    });

                    setShowModal(false);
                    setFormData({});
                    alert('Actividad creada exitosamente');
                } catch (error) {
                    alert('Error al crear actividad');
                }
            };

            const handleEditActivity = (activity) => {
                setFormData({
                    id: activity.id,
                    nombre: activity.nombre,
                    descripcion: activity.descripcion,
                    lugar: activity.lugar,
                    fecha: activity.fecha,
                    horaInicio: activity.horaInicio || '',
                    horaFin: activity.horaFin || ''
                });
                setModalType('editActivity');
                setShowModal(true);
            };

            const handleUpdateActivity = async () => {
                try {
                    // Comparar solo fechas sin hora
                    const today = new Date();
                    today.setHours(0, 0, 0, 0);
                    const activityDate = new Date(formData.fecha);
                    activityDate.setHours(0, 0, 0, 0);
                    const estadoActividad = activityDate >= today ? 'activa' : 'inactiva';

                    await database.ref(`actividades/${formData.id}`).update({
                        nombre: formData.nombre,
                        descripcion: formData.descripcion,
                        lugar: formData.lugar,
                        fecha: formData.fecha,
                        horaInicio: formData.horaInicio || '',
                        horaFin: formData.horaFin || '',
                        estado: estadoActividad
                    });

                    setShowModal(false);
                    setFormData({});
                    alert('Actividad actualizada');
                } catch (error) {
                    alert('Error al actualizar');
                }
            };

            const handleDeleteActivity = async (id) => {
                if (confirm('¿Eliminar esta actividad?')) {
                    try {
                        await database.ref(`actividades/${id}`).remove();
                    } catch (error) {
                        alert('Error al eliminar');
                    }
                }
            };

            const handleViewInscritos = (activity) => {
                setSelectedActivity(activity);
                setModalType('viewInscritos');
                setShowModal(true);
            };

            const handleToggleAsistencia = async (activityId, uid, currentStatus) => {
                const newStatus = currentStatus === 'asistio' ? 'no_asistio' : 'asistio';
                
                try {
                    if (newStatus === 'asistio') {
                        await database.ref(`actividades/${activityId}/asistencias/${uid}`).update({
                            estado: 'asistio',
                            horasAprobadas: 0
                        });
                    } else {
                        await database.ref(`actividades/${activityId}/asistencias/${uid}`).update({
                            estado: 'no_asistio',
                            horasAprobadas: 0,
                            entrada: null,
                            salida: null
                        });
                    }
                } catch (error) {
                    alert('Error al actualizar asistencia');
                }
            };

            const handleUpdateHoras = async (activityId, uid, horas) => {
                const horasNum = parseFloat(horas);
                if (isNaN(horasNum) || horasNum < 0) {
                    alert('Ingrese un número válido de horas');
                    return;
                }

                try {
                    await database.ref(`actividades/${activityId}/asistencias/${uid}`).update({
                        horasAprobadas: horasNum,
                        editadoPorCoordinador: true
                    });
                    alert('Horas actualizadas');
                } catch (error) {
                    alert('Error al actualizar horas');
                }
            };

            const exportToExcel = () => {
                const reportData = [];
                
                volunteers.forEach(vol => {
                    const volActivities = activities.filter(act => 
                        act.asistencias && act.asistencias[vol.uid] && act.asistencias[vol.uid].estado === 'asistio'
                    );
                    
                    if (volActivities.length === 0) {
                        reportData.push({
                            'Nombre Voluntario': vol.nombreCompleto,
                            'Estado': vol.estado || 'activo',
                            'Actividad': 'Sin actividades',
                            'Fecha Actividad': '-',
                            'Lugar': '-',
                            'Horas Trabajadas': 0,
                            'Badge': getBadge(0).name
                        });
                    } else {
                        volActivities.forEach(act => {
                            const attendance = act.asistencias[vol.uid];
                            reportData.push({
                                'Nombre Voluntario': vol.nombreCompleto,
                                'Estado': vol.estado || 'activo',
                                'Actividad': act.nombre,
                                'Fecha Actividad': new Date(act.fecha).toLocaleDateString('es-PE'),
                                'Lugar': act.lugar,
                                'Horas Trabajadas': attendance.horasAprobadas || 0,
                                'Badge': getBadge(calculateHorasVoluntario(vol.uid)).name
                            });
                        });
                    }
                });

                const XLSX = window.XLSX;
                const wb = XLSX.utils.book_new();
                
                const ws1 = XLSX.utils.json_to_sheet(reportData);
                XLSX.utils.book_append_sheet(wb, ws1, "Reporte Detallado");
                
                const summaryData = volunteers.map(vol => {
                    const totalHoras = calculateHorasVoluntario(vol.uid);
                    const badge = getBadge(totalHoras);
                    
                    return {
                        'Nombre Voluntario': vol.nombreCompleto,
                        'Estado': vol.estado || 'activo',
                        'Año Ingreso': vol.anoIngreso,
                        'Total Horas': totalHoras.toFixed(2),
                        'Badge': badge.name
                    };
                });
                
                const ws2 = XLSX.utils.json_to_sheet(summaryData);
                XLSX.utils.book_append_sheet(wb, ws2, "Resumen");
                
                const fecha = new Date().toISOString().split('T')[0];
                XLSX.writeFile(wb, `Reporte_Voluntarios_${fecha}.xlsx`);
            };

            const calculateHorasVoluntario = (uid) => {
                return activities.reduce((sum, act) => {
                    if (act.asistencias && act.asistencias[uid] && act.asistencias[uid].estado === 'asistio') {
                        return sum + (act.asistencias[uid].horasAprobadas || 0);
                    }
                    return sum;
                }, 0);
            };

            const filteredVolunteers = volunteers.filter(vol => {
                const matchesSearch = vol.nombreCompleto.toLowerCase().includes(searchTerm.toLowerCase()) ||
                                    vol.correo.toLowerCase().includes(searchTerm.toLowerCase());
                const matchesFilter = filterStatus === 'all' || vol.estado === filterStatus || (!vol.estado && filterStatus === 'activo');
                return matchesSearch && matchesFilter;
            });

            const renderDashboard = () => {
                const activeVolunteers = volunteers.filter(v => v.estado === 'activo' || !v.estado).length;
                const activeActivities = activities.filter(a => a.estado === 'activa').length;
                const totalHoras = volunteers.reduce((sum, v) => sum + calculateHorasVoluntario(v.uid), 0);

                // Ranking
                const ranking = volunteers
                    .map(v => ({ ...v, totalHoras: calculateHorasVoluntario(v.uid) }))
                    .filter(v => v.estado === 'activo' || !v.estado)
                    .sort((a, b) => b.totalHoras - a.totalHoras)
                    .slice(0, 10);

                return (
                    <div>
                        <h2 style={{marginBottom: '30px', color: '#333'}}>Panel de Control</h2>
                        <div className="stats-grid">
                            <div className="stat-card">
                                <h3>Voluntarios Activos</h3>
                                <div className="value">{activeVolunteers}</div>
                            </div>
                            <div className="stat-card">
                                <h3>Actividades Activas</h3>
                                <div className="value">{activeActivities}</div>
                            </div>
                            <div className="stat-card">
                                <h3>Total Actividades</h3>
                                <div className="value">{activities.length}</div>
                            </div>
                            <div className="stat-card">
                                <h3>Horas Totales</h3>
                                <div className="value">{totalHoras.toFixed(0)}</div>
                            </div>
                        </div>

                        <div className="table-container" style={{marginBottom: '30px'}}>
                            <div className="table-header">
                                <h2>🏆 Ranking de Voluntarios - Top 10</h2>
                            </div>
                            <div style={{padding: '20px'}}>
                                {ranking.map((vol, index) => {
                                    const badge = getBadge(vol.totalHoras);
                                    return (
                                        <div key={vol.uid} className="ranking-card">
                                            <div className="ranking-position">
                                                {index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : `#${index + 1}`}
                                            </div>
                                            <div className="ranking-info">
                                                <div className="ranking-name">{vol.nombreCompleto}</div>
                                                <span className={`badge ${badge.class}`}>{badge.name}</span>
                                            </div>
                                            <div className="ranking-hours">{vol.totalHoras.toFixed(1)} hrs</div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>

                        <div className="table-container">
                            <div className="table-header">
                                <h2>Actividades Recientes</h2>
                            </div>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Actividad</th>
                                        <th>Fecha</th>
                                        <th>Horario</th>
                                        <th>Lugar</th>
                                        <th>Inscritos</th>
                                        <th>Estado</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {activities.slice(0, 5).map(act => (
                                        <tr key={act.id}>
                                            <td>{act.nombre}</td>
                                            <td>{new Date(act.fecha).toLocaleDateString('es-PE')}</td>
                                            <td>{act.horaInicio && act.horaFin ? `${act.horaInicio} - ${act.horaFin}` : '-'}</td>
                                            <td>{act.lugar}</td>
                                            <td>{act.inscritos ? Object.keys(act.inscritos).length : 0}</td>
                                            <td>
                                                <span className={`badge badge-${act.estado === 'activa' ? 'active' : 'inactive'}`}>
                                                    {act.estado}
                                                </span>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            const renderVolunteers = () => (
                <div>
                    <div className="table-container">
                        <div className="table-header">
                            <h2>Gestión de Voluntarios</h2>
                            <div className="search-filter-container">
                                <input 
                                    type="text"
                                    className="search-box"
                                    placeholder="Buscar por nombre o correo..."
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                                <select 
                                    className="search-box"
                                    value={filterStatus}
                                    onChange={(e) => setFilterStatus(e.target.value)}
                                    style={{minWidth: '150px'}}
                                >
                                    <option value="all">Todos</option>
                                    <option value="activo">Activos</option>
                                    <option value="inactivo">Inactivos</option>
                                </select>
                                <button className="btn btn-add" onClick={() => { setModalType('addVolunteer'); setFormData({}); setShowModal(true); }}>
                                    + Agregar
                                </button>
                            </div>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Correo</th>
                                    <th>Año</th>
                                    <th>Horas</th>
                                    <th>Badge</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredVolunteers.map(vol => {
                                    const horas = calculateHorasVoluntario(vol.uid);
                                    const badge = getBadge(horas);
                                    const estado = vol.estado || 'activo';
                                    
                                    return (
                                        <tr key={vol.uid}>
                                            <td>{vol.nombreCompleto}</td>
                                            <td>{vol.correo}</td>
                                            <td>{vol.anoIngreso}</td>
                                            <td>{horas.toFixed(1)} hrs</td>
                                            <td><span className={`badge ${badge.class}`}>{badge.name}</span></td>
                                            <td>
                                                <span className={`badge badge-${estado === 'activo' ? 'active' : 'inactive'}`}>
                                                    {estado}
                                                </span>
                                            </td>
                                            <td>
                                                <button 
                                                    className={`btn ${estado === 'activo' ? 'btn-warning' : 'btn-success'}`}
                                                    style={{marginRight: '5px'}}
                                                    onClick={() => handleToggleStatus(vol.uid, estado)}
                                                >
                                                    {estado === 'activo' ? 'Desactivar' : 'Activar'}
                                                </button>
                                                <button 
                                                    className="btn btn-delete" 
                                                    onClick={() => handleDeleteVolunteer(vol.uid)}
                                                >
                                                    Eliminar
                                                </button>
                                            </td>
                                        </tr>
                                    );
                                })}
                            </tbody>
                        </table>
                    </div>
                </div>
            );

            const renderActivities = () => (
                <div>
                    <div className="table-container">
                        <div className="table-header">
                            <h2>Gestión de Actividades</h2>
                            <button className="btn btn-add" onClick={() => { setModalType('addActivity'); setFormData({}); setShowModal(true); }}>
                                + Crear Actividad
                            </button>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Nombre</th>
                                    <th>Fecha</th>
                                    <th>Horario</th>
                                    <th>Lugar</th>
                                    <th>Inscritos</th>
                                    <th>Estado</th>
                                    <th>Acciones</th>
                                </tr>
                            </thead>
                            <tbody>
                                {activities.map(act => (
                                    <tr key={act.id}>
                                        <td>{act.nombre}</td>
                                        <td>{new Date(act.fecha).toLocaleDateString('es-PE')}</td>
                                        <td>{act.horaInicio && act.horaFin ? `${act.horaInicio} - ${act.horaFin}` : '-'}</td>
                                        <td>{act.lugar}</td>
                                        <td>{act.inscritos ? Object.keys(act.inscritos).length : 0}</td>
                                        <td>
                                            <span className={`badge badge-${act.estado === 'activa' ? 'active' : 'inactive'}`}>
                                                {act.estado}
                                            </span>
                                        </td>
                                        <td>
                                            <button className="btn btn-success" style={{marginRight: '5px'}} onClick={() => handleViewInscritos(act)}>
                                                Ver Inscritos
                                            </button>
                                            <button className="btn btn-edit" style={{marginRight: '5px'}} onClick={() => handleEditActivity(act)}>
                                                Editar
                                            </button>
                                            <button className="btn btn-delete" onClick={() => handleDeleteActivity(act.id)}>
                                                Eliminar
                                            </button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );

            const renderReports = () => {
                const monthlyData = volunteers.map(vol => {
                    const totalHoras = calculateHorasVoluntario(vol.uid);
                    const badge = getBadge(totalHoras);
                    const actividadesCount = activities.filter(act => 
                        act.asistencias && act.asistencias[vol.uid] && act.asistencias[vol.uid].estado === 'asistio'
                    ).length;

                    return {
                        voluntario: vol.nombreCompleto,
                        estado: vol.estado || 'activo',
                        actividades: actividadesCount,
                        horasTotales: totalHoras,
                        badge: badge.name
                    };
                });

                return (
                    <div>
                        <div className="table-container">
                            <div className="table-header">
                                <h2>Reporte de Voluntarios</h2>
                                <button className="btn btn-success" onClick={exportToExcel}>
                                    📥 Exportar a Excel
                                </button>
                            </div>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Voluntario</th>
                                        <th>Estado</th>
                                        <th>Actividades</th>
                                        <th>Horas Totales</th>
                                        <th>Badge</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {monthlyData.map((data, idx) => (
                                        <tr key={idx}>
                                            <td>{data.voluntario}</td>
                                            <td>
                                                <span className={`badge badge-${data.estado === 'activo' ? 'active' : 'inactive'}`}>
                                                    {data.estado}
                                                </span>
                                            </td>
                                            <td>{data.actividades}</td>
                                            <td><strong>{data.horasTotales.toFixed(2)} hrs</strong></td>
                                            <td>{data.badge}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            const renderModalContent = () => {
                if (modalType === 'addVolunteer') {
                    return (
                        <>
                            <h2>Agregar Nuevo Voluntario</h2>
                            <div className="form-group">
                                <label>Nombre Completo</label>
                                <input 
                                    type="text"
                                    value={formData.nombreCompleto || ''}
                                    onChange={(e) => setFormData({...formData, nombreCompleto: e.target.value})}
                                    placeholder="Ej: Juan Carlos Pérez García"
                                />
                            </div>
                            <div className="form-group">
                                <label>Correo Electrónico</label>
                                <input 
                                    type="email"
                                    value={formData.correo || ''}
                                    onChange={(e) => setFormData({...formData, correo: e.target.value})}
                                    placeholder="correo@ejemplo.com"
                                />
                            </div>
                            <div className="form-group">
                                <label>Año de Ingreso</label>
                                <input 
                                    type="number"
                                    value={formData.anoIngreso || ''}
                                    onChange={(e) => setFormData({...formData, anoIngreso: e.target.value})}
                                    placeholder="2024"
                                    min="2000"
                                    max="2030"
                                />
                            </div>
                            <div className="modal-buttons">
                                <button className="btn btn-secondary" onClick={() => setShowModal(false)}>
                                    Cancelar
                                </button>
                                <button className="btn btn-add" onClick={handleAddVolunteer}>
                                    Agregar
                                </button>
                            </div>
                        </>
                    );
                }

                if (modalType === 'addActivity' || modalType === 'editActivity') {
                    return (
                        <>
                            <h2>{modalType === 'addActivity' ? 'Crear Nueva Actividad' : 'Editar Actividad'}</h2>
                            <div className="form-group">
                                <label>Nombre de Actividad</label>
                                <input 
                                    type="text"
                                    value={formData.nombre || ''}
                                    onChange={(e) => setFormData({...formData, nombre: e.target.value})}
                                />
                            </div>
                            <div className="form-group">
                                <label>Descripción</label>
                                <textarea 
                                    value={formData.descripcion || ''}
                                    onChange={(e) => setFormData({...formData, descripcion: e.target.value})}
                                    rows="3"
                                />
                            </div>
                            <div className="form-group">
                                <label>Lugar</label>
                                <input 
                                    type="text"
                                    value={formData.lugar || ''}
                                    onChange={(e) => setFormData({...formData, lugar: e.target.value})}
                                />
                            </div>
                            <div className="form-group">
                                <label>Fecha</label>
                                <input 
                                    type="date"
                                    value={formData.fecha || ''}
                                    onChange={(e) => setFormData({...formData, fecha: e.target.value})}
                                />
                            </div>
                            <div style={{display: 'grid', gridTemplateColumns: '1fr 1fr', gap: '15px'}}>
                                <div className="form-group">
                                    <label>Hora Inicio (opcional)</label>
                                    <input 
                                        type="time"
                                        value={formData.horaInicio || ''}
                                        onChange={(e) => setFormData({...formData, horaInicio: e.target.value})}
                                    />
                                </div>
                                <div className="form-group">
                                    <label>Hora Fin (opcional)</label>
                                    <input 
                                        type="time"
                                        value={formData.horaFin || ''}
                                        onChange={(e) => setFormData({...formData, horaFin: e.target.value})}
                                    />
                                </div>
                            </div>
                            <div className="modal-buttons">
                                <button className="btn btn-secondary" onClick={() => setShowModal(false)}>
                                    Cancelar
                                </button>
                                <button className="btn btn-add" onClick={modalType === 'addActivity' ? handleAddActivity : handleUpdateActivity}>
                                    {modalType === 'addActivity' ? 'Crear' : 'Guardar'}
                                </button>
                            </div>
                        </>
                    );
                }

                if (modalType === 'viewInscritos' && selectedActivity) {
                    const inscritos = selectedActivity.inscritos ? Object.keys(selectedActivity.inscritos) : [];
                    
                    return (
                        <>
                            <h2>Voluntarios Inscritos - {selectedActivity.nombre}</h2>
                            <p style={{color: '#666', marginBottom: '20px'}}>
                                {selectedActivity.fecha} | {selectedActivity.horaInicio && selectedActivity.horaFin ? `${selectedActivity.horaInicio} - ${selectedActivity.horaFin}` : 'Sin horario'}
                            </p>
                            
                            {inscritos.length === 0 ? (
                                <p style={{textAlign: 'center', padding: '20px', color: '#999'}}>
                                    No hay voluntarios inscritos en esta actividad
                                </p>
                            ) : (
                                <div className="inscritos-list">
                                    {inscritos.map(uid => {
                                        const vol = volunteers.find(v => v.uid === uid);
                                        if (!vol) return null;
                                        
                                        const asistencia = selectedActivity.asistencias?.[uid] || {};
                                        const estado = asistencia.estado || 'pendiente';
                                        const horas = asistencia.horasAprobadas || 0;
                                        
                                        return (
                                            <div key={uid} className="inscrito-item">
                                                <div className="inscrito-info">
                                                    <div style={{fontWeight: 'bold', marginBottom: '5px'}}>
                                                        {vol.nombreCompleto}
                                                    </div>
                                                    <div style={{fontSize: '14px', color: '#666'}}>
                                                        {estado === 'asistio' ? '✅ Asistió' : estado === 'no_asistio' ? '❌ No asistió' : '⏳ Pendiente'}
                                                        {estado === 'asistio' && ` - ${horas.toFixed(2)} horas`}
                                                    </div>
                                                </div>
                                                <div className="inscrito-actions">
                                                    <button 
                                                        className={`btn ${estado === 'asistio' ? 'btn-warning' : 'btn-success'}`}
                                                        onClick={() => handleToggleAsistencia(selectedActivity.id, uid, estado)}
                                                    >
                                                        {estado === 'asistio' ? 'Marcar No Asistió' : 'Marcar Asistió'}
                                                    </button>
                                                    {estado === 'asistio' && (
                                                        <div style={{display: 'flex', gap: '5px', alignItems: 'center'}}>
                                                            <input 
                                                                type="number"
                                                                className="time-input"
                                                                placeholder="Horas"
                                                                defaultValue={horas}
                                                                step="0.5"
                                                                min="0"
                                                                onBlur={(e) => {
                                                                    if (e.target.value && e.target.value !== horas.toString()) {
                                                                        handleUpdateHoras(selectedActivity.id, uid, e.target.value);
                                                                    }
                                                                }}
                                                            />
                                                            <span style={{fontSize: '12px'}}>hrs</span>
                                                        </div>
                                                    )}
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                            
                            <div className="modal-buttons">
                                <button className="btn btn-secondary" onClick={() => setShowModal(false)}>
                                    Cerrar
                                </button>
                            </div>
                        </>
                    );
                }

                return null;
            };

            if (loading) {
                return <div className="loading">Cargando...</div>;
            }

            return (
                <div className="container">
                    <div className="dashboard">
                        <div className="dashboard-header">
                            <h1>Panel Coordinador - Cruz Roja Peruana</h1>
                            <div className="user-info">
                                <span>👤 {user.nombreCompleto}</span>
                                <button className="btn-logout" onClick={onLogout}>
                                    Cerrar Sesión
                                </button>
                            </div>
                        </div>

                        <div className="dashboard-content">
                            <div className="sidebar">
                                <div className={`menu-item ${activeTab === 'dashboard' ? 'active' : ''}`} onClick={() => setActiveTab('dashboard')}>
                                    📊 Dashboard
                                </div>
                                <div className={`menu-item ${activeTab === 'volunteers' ? 'active' : ''}`} onClick={() => setActiveTab('volunteers')}>
                                    👥 Voluntarios
                                </div>
                                <div className={`menu-item ${activeTab === 'activities' ? 'active' : ''}`} onClick={() => setActiveTab('activities')}>
                                    📅 Actividades
                                </div>
                                <div className={`menu-item ${activeTab === 'reports' ? 'active' : ''}`} onClick={() => setActiveTab('reports')}>
                                    📈 Reportes
                                </div>
                            </div>

                            <div className="main-content">
                                {activeTab === 'dashboard' && renderDashboard()}
                                {activeTab === 'volunteers' && renderVolunteers()}
                                {activeTab === 'activities' && renderActivities()}
                                {activeTab === 'reports' && renderReports()}
                            </div>
                        </div>
                    </div>

                    {showModal && (
                        <div className="modal-overlay" onClick={() => setShowModal(false)}>
                            <div className="modal" onClick={(e) => e.stopPropagation()}>
                                {renderModalContent()}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // VOLUNTARIO DASHBOARD (Simplified - same as before)
        // ==========================================
        function VoluntarioDashboard({ user, onLogout }) {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [activities, setActivities] = useState([]);
            const [showPasswordModal, setShowPasswordModal] = useState(user.primerIngreso || false);
            const [newPassword, setNewPassword] = useState('');
            const [confirmPassword, setConfirmPassword] = useState('');
            const [passwordError, setPasswordError] = useState('');

            useEffect(() => {
                loadActivities();
            }, []);

            const loadActivities = () => {
                database.ref('actividades').on('value', (snapshot) => {
                    const data = snapshot.val();
                    if (data) {
                        const actList = Object.keys(data).map(id => ({ id, ...data[id] }));
                        setActivities(actList);
                    } else {
                        setActivities([]);
                    }
                });
            };

            const handleChangePassword = async () => {
                setPasswordError('');

                if (!newPassword || !confirmPassword) {
                    setPasswordError('Por favor complete ambos campos');
                    return;
                }

                if (newPassword.length < 6) {
                    setPasswordError('La contraseña debe tener al menos 6 caracteres');
                    return;
                }

                if (newPassword !== confirmPassword) {
                    setPasswordError('Las contraseñas no coinciden');
                    return;
                }

                if (newPassword === 'temporal123') {
                    setPasswordError('La nueva contraseña no puede ser igual a la temporal');
                    return;
                }

                try {
                    const currentUser = auth.currentUser;
                    await currentUser.updatePassword(newPassword);
                    await database.ref(`usuarios/${user.uid}`).update({ primerIngreso: false });
                    
                    setShowPasswordModal(false);
                    alert('¡Contraseña actualizada exitosamente!');
                } catch (error) {
                    setPasswordError('Error al cambiar la contraseña: ' + error.message);
                }
            };

            const handleInscribirse = async (activityId) => {
                try {
                    await database.ref(`actividades/${activityId}/inscritos/${user.uid}`).set(true);
                    alert('¡Inscripción exitosa!');
                } catch (error) {
                    alert('Error al inscribirse');
                }
            };

            const handleMarcarEntrada = async (activityId) => {
                try {
                    await database.ref(`actividades/${activityId}/asistencias/${user.uid}`).set({
                        entrada: new Date().toISOString(),
                        salida: null,
                        horasAprobadas: 0,
                        estado: 'asistio'
                    });
                    alert('Entrada registrada: ' + new Date().toLocaleTimeString('es-PE'));
                } catch (error) {
                    alert('Error al marcar entrada');
                }
            };

            const handleMarcarSalida = async (activityId) => {
                try {
                    const snapshot = await database.ref(`actividades/${activityId}/asistencias/${user.uid}`).once('value');
                    const attendance = snapshot.val();
                    
                    if (attendance && !attendance.salida) {
                        const salida = new Date().toISOString();
                        const entrada = new Date(attendance.entrada);
                        const salidaDate = new Date(salida);
                        const diffHours = (salidaDate - entrada) / (1000 * 60 * 60);
                        
                        await database.ref(`actividades/${activityId}/asistencias/${user.uid}`).update({
                            salida: salida,
                            horasAprobadas: parseFloat(diffHours.toFixed(2))
                        });
                        
                        alert(`Salida registrada\nHoras: ${diffHours.toFixed(2)} hrs`);
                    }
                } catch (error) {
                    alert('Error al marcar salida');
                }
            };

            const calculateMyHoras = () => {
                return activities.reduce((sum, act) => {
                    if (act.asistencias && act.asistencias[user.uid] && act.asistencias[user.uid].estado === 'asistio') {
                        return sum + (act.asistencias[user.uid].horasAprobadas || 0);
                    }
                    return sum;
                }, 0);
            };

            const renderDashboard = () => {
                const myActivities = activities.filter(a => a.inscritos && a.inscritos[user.uid]);
                const totalHoras = calculateMyHoras();
                const badge = getBadge(totalHoras);

                return (
                    <div>
                        <h2 style={{marginBottom: '30px', color: '#333'}}>Bienvenido, {user.nombreCompleto.split(' ')[0]}</h2>
                        <div className="stats-grid">
                            <div className="stat-card">
                                <h3>Actividades Participadas</h3>
                                <div className="value">{myActivities.length}</div>
                            </div>
                            <div className="stat-card">
                                <h3>Horas Acumuladas</h3>
                                <div className="value">{totalHoras.toFixed(1)}</div>
                            </div>
                            <div className="stat-card">
                                <h3>Tu Badge</h3>
                                <div className="value" style={{fontSize: '24px'}}>
                                    <span className={`badge ${badge.class}`}>{badge.name}</span>
                                </div>
                            </div>
                        </div>

                        <div className="table-container" style={{marginTop: '30px'}}>
                            <div className="table-header">
                                <h2>Mis Actividades</h2>
                            </div>
                            <table>
                                <thead>
                                    <tr>
                                        <th>Actividad</th>
                                        <th>Fecha</th>
                                        <th>Lugar</th>
                                        <th>Asistencia</th>
                                        <th>Horas</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {myActivities.map(act => {
                                        const attendance = act.asistencias && act.asistencias[user.uid];
                                        const estado = attendance?.estado || 'pendiente';
                                        return (
                                            <tr key={act.id}>
                                                <td>{act.nombre}</td>
                                                <td>{new Date(act.fecha).toLocaleDateString('es-PE')}</td>
                                                <td>{act.lugar}</td>
                                                <td>
                                                    {estado === 'asistio' ? '✅ Asistió' : estado === 'no_asistio' ? '❌ No asistió' : '⏳ Pendiente'}
                                                </td>
                                                <td>{attendance?.horasAprobadas || 0} hrs</td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>
                );
            };

            const renderActivities = () => {
                const availableActivities = activities.filter(a => a.estado === 'activa');

                return (
                    <div>
                        <h2 style={{marginBottom: '20px', color: '#333'}}>Actividades Disponibles</h2>
                        
                        <div style={{background: '#fff3cd', padding: '15px', borderRadius: '10px', marginBottom: '25px'}}>
                            <strong style={{color: '#856404'}}>ℹ️ Importante:</strong>
                            <p style={{margin: '10px 0 0 0', color: '#856404', fontSize: '14px'}}>
                                Los botones de Marcar Entrada/Salida solo aparecen el día de la actividad.
                            </p>
                        </div>
                        
                        {availableActivities.map(act => {
                            const isInscrito = act.inscritos && act.inscritos[user.uid];
                            const attendance = act.asistencias && act.asistencias[user.uid];
                            const isToday = new Date(act.fecha).toDateString() === new Date().toDateString();

                            return (
                                <div key={act.id} className="activity-card">
                                    <div style={{display: 'flex', justifyContent: 'space-between', alignItems: 'start'}}>
                                        <h3>{act.nombre}</h3>
                                        {isToday && <span className="badge badge-pending">📅 HOY</span>}
                                    </div>
                                    <p style={{color: '#666', marginBottom: '15px'}}>{act.descripcion}</p>
                                    
                                    <div className="activity-info">
                                        <div>📍 <strong>Lugar:</strong> {act.lugar}</div>
                                        <div>📅 <strong>Fecha:</strong> {new Date(act.fecha).toLocaleDateString('es-PE')}</div>
                                        <div>🕐 <strong>Horario:</strong> {act.horaInicio && act.horaFin ? `${act.horaInicio} - ${act.horaFin}` : 'Por definir'}</div>
                                        <div>
                                            {isInscrito ? (
                                                <span className="badge badge-active">✓ Inscrito</span>
                                            ) : (
                                                <span className="badge badge-inactive">No inscrito</span>
                                            )}
                                        </div>
                                    </div>

                                    <div className="activity-actions">
                                        {!isInscrito ? (
                                            <button className="btn btn-add" onClick={() => handleInscribirse(act.id)}>
                                                Inscribirme
                                            </button>
                                        ) : (
                                            <>
                                                {isToday && !attendance?.entrada && (
                                                    <button className="btn btn-success" onClick={() => handleMarcarEntrada(act.id)}>
                                                        ✓ Marcar Entrada
                                                    </button>
                                                )}
                                                
                                                {attendance?.entrada && !attendance?.salida && (
                                                    <div style={{display: 'flex', gap: '10px', alignItems: 'center'}}>
                                                        <div className="time-display">
                                                            Entrada: {new Date(attendance.entrada).toLocaleTimeString('es-PE')}
                                                        </div>
                                                        <button className="btn btn-delete" onClick={() => handleMarcarSalida(act.id)}>
                                                            Marcar Salida
                                                        </button>
                                                    </div>
                                                )}

                                                {attendance?.salida && (
                                                    <div className="attendance-box">
                                                        <div style={{marginBottom: '10px'}}><strong>✅ Asistencia Registrada</strong></div>
                                                        <div>Entrada: {new Date(attendance.entrada).toLocaleTimeString('es-PE')}</div>
                                                        <div>Salida: {new Date(attendance.salida).toLocaleTimeString('es-PE')}</div>
                                                        <div style={{color: '#C8102E', fontWeight: 'bold', marginTop: '10px'}}>
                                                            Total: {attendance.horasAprobadas} horas
                                                        </div>
                                                    </div>
                                                )}
                                                
                                                {isInscrito && !isToday && !attendance && (
                                                    <div style={{background: '#e9ecef', padding: '10px', borderRadius: '6px', fontSize: '13px', color: '#666'}}>
                                                        ⏰ Podrás marcar entrada/salida el día de la actividad
                                                    </div>
                                                )}
                                            </>
                                        )}
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                );
            };

            return (
                <div className="container">
                    <div className="dashboard">
                        <div className="dashboard-header">
                            <h1>Portal del Voluntario - Cruz Roja Peruana</h1>
                            <div className="user-info">
                                <span>👤 {user.nombreCompleto}</span>
                                <button className="btn-logout" onClick={onLogout}>
                                    Cerrar Sesión
                                </button>
                            </div>
                        </div>

                        <div className="dashboard-content">
                            <div className="sidebar">
                                <div className={`menu-item ${activeTab === 'dashboard' ? 'active' : ''}`} onClick={() => setActiveTab('dashboard')}>
                                    🏠 Inicio
                                </div>
                                <div className={`menu-item ${activeTab === 'activities' ? 'active' : ''}`} onClick={() => setActiveTab('activities')}>
                                    📅 Actividades
                                </div>
                            </div>

                            <div className="main-content">
                                {activeTab === 'dashboard' && renderDashboard()}
                                {activeTab === 'activities' && renderActivities()}
                            </div>
                        </div>
                    </div>

                    {showPasswordModal && (
                        <div className="modal-overlay">
                            <div className="modal" style={{maxWidth: '500px'}}>
                                <h2 style={{color: '#C8102E', marginBottom: '15px'}}>🔒 Cambio de Contraseña Obligatorio</h2>
                                <p style={{color: '#666', marginBottom: '25px', fontSize: '14px'}}>
                                    Por seguridad, debes cambiar tu contraseña temporal.
                                </p>
                                
                                {passwordError && (
                                    <div className="error-message">{passwordError}</div>
                                )}

                                <div className="form-group">
                                    <label>Nueva Contraseña</label>
                                    <input 
                                        type="password"
                                        value={newPassword}
                                        onChange={(e) => setNewPassword(e.target.value)}
                                        placeholder="Mínimo 6 caracteres"
                                    />
                                </div>

                                <div className="form-group">
                                    <label>Confirmar Contraseña</label>
                                    <input 
                                        type="password"
                                        value={confirmPassword}
                                        onChange={(e) => setConfirmPassword(e.target.value)}
                                        placeholder="Repite la contraseña"
                                    />
                                </div>

                                <button className="btn btn-add" style={{width: '100%'}} onClick={handleChangePassword}>
                                    Cambiar Contraseña
                                </button>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        // ==========================================
        // MAIN APP
        // ==========================================
        function App() {
            const [currentUser, setCurrentUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const unsubscribe = auth.onAuthStateChanged(async (firebaseUser) => {
                    if (firebaseUser) {
                        const snapshot = await database.ref(`usuarios/${firebaseUser.uid}`).once('value');
                        const userData = snapshot.val();
                        if (userData) {
                            setCurrentUser({ uid: firebaseUser.uid, ...userData });
                        }
                    } else {
                        setCurrentUser(null);
                    }
                    setLoading(false);
                });

                return () => unsubscribe();
            }, []);

            const handleLogin = (user) => {
                setCurrentUser(user);
            };

            const handleLogout = async () => {
                await auth.signOut();
                setCurrentUser(null);
            };

            if (loading) {
                return <div className="loading">Cargando...</div>;
            }

            if (!currentUser) {
                return <Login onLogin={handleLogin} />;
            }

            if (currentUser.rol === 'coordinador') {
                return <CoordinadorDashboard user={currentUser} onLogout={handleLogout} />;
            }

            return <VoluntarioDashboard user={currentUser} onLogout={handleLogout} />;
        }

        ReactDOM.render(<App />, document.getElementById('root'));
    </script>
</body>
</html>
